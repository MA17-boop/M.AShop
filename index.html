<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M.AShop Simple</title>
<style>
body{font-family:sans-serif;margin:0;padding:0;background:#f9f9f9;}
header{display:flex;justify-content:space-between;padding:1rem;background:#0d47a1;color:white;}
button{padding:0.5rem 1rem;margin:0.3rem;cursor:pointer;}
section{display:none;padding:1rem;}
section.active{display:block;}
.products{display:flex;flex-wrap:wrap;gap:1rem;}
.product{background:white;padding:0.5rem;border:1px solid #ccc;width:200px;text-align:center;}
</style>
</head>
<body>

<header>
<h1>M.AShop</h1>
<div>
<button onclick="showSection('home')">Home</button>
<button onclick="showSection('login')">Login</button>
<button onclick="showSection('register')">Register</button>
<button id="logoutBtn" onclick="logout()" style="display:none;">Logout</button>
</div>
</header>

<section id="home" class="active">
<h2>Selamat Datang di M.AShop!</h2>
<p>Belanja mudah & cepat. Daftar untuk mulai menjual produkmu.</p>
<div class="products" id="previewProducts"></div>
</section>

<section id="register">
<h2>Register Penjual</h2>
<input type="text" id="regUsername" placeholder="Username"><br>
<input type="text" id="regWA" placeholder="Nomor WA (tanpa 0, misal 81234567890)"><br>
<input type="password" id="regPassword" placeholder="Password"><br>
<button id="registerBtn">Register</button>
<p id="regError" style="color:red;"></p>
</section>

<section id="login">
<h2>Login</h2>
<input type="text" id="loginWA" placeholder="Nomor WA"><br>
<input type="password" id="loginPassword" placeholder="Password"><br>
<button id="loginBtn">Login</button>
<p id="loginError" style="color:red;"></p>
</section>

<section id="dashboard">
<h2>Halo, <span id="userRole"></span></h2>
<button id="addProductBtn">Tambah Produk</button>
<div class="products" id="userProducts"></div>
</section>

<div id="productModal" style="display:none;">
<h3>Tambah Produk</h3>
<input type="text" id="prodName" placeholder="Nama Produk"><br>
<input type="number" id="prodPrice" placeholder="Harga Produk"><br>
<input type="file" id="prodImage"><br>
<button id="saveProductBtn">Simpan</button>
<button onclick="closeModal()">Batal</button>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<script>
// ===== Firebase Config =====
const firebaseConfig = {
  apiKey: "AIzaSyAqPWxMcBFj6-t_fUJx0AmJFryvrozLHNo",
  authDomain: "ma17shop.firebaseapp.com",
  projectId: "ma17shop",
  storageBucket: "ma17shop.appspot.com",
  messagingSenderId: "473838132234",
  appId: "1:473838132234:web:4b336fc4f16e586dc4d3f3"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

// ===== Navigation =====
const sections = document.querySelectorAll('section');
const logoutBtn = document.getElementById('logoutBtn');
let currentUser = null;
function showSection(id){
sections.forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
logoutBtn.style.display=currentUser?'inline-block':'none';
if(currentUser) document.getElementById('userRole').textContent=currentUser.username;
renderProducts();
}
function logout(){ currentUser=null; showSection('home');}

// ===== Register =====
document.getElementById('registerBtn').addEventListener('click', async ()=>{
const username=document.getElementById('regUsername').value.trim();
const wa=document.getElementById('regWA').value.trim();
const password=document.getElementById('regPassword').value.trim();
const regError=document.getElementById('regError');
if(!username||!wa||!password){ regError.textContent='Isi semua data!'; return;}
const snapshot = await db.collection('users').where('wa','==',wa).get();
if(!snapshot.empty){ regError.textContent='Nomor WA sudah dipakai!'; return;}
await db.collection('users').add({username,wa,password});
alert('Akun berhasil dibuat! Silahkan login.'); showSection('login');
});

// ===== Login =====
document.getElementById('loginBtn').addEventListener('click', async ()=>{
const wa=document.getElementById('loginWA').value.trim();
const password=document.getElementById('loginPassword').value.trim();
const snapshot = await db.collection('users').where('wa','==',wa).where('password','==',password).get();
if(!snapshot.empty){
currentUser = snapshot.docs[0].data(); currentUser.id=snapshot.docs[0].id;
showSection('dashboard');
}else document.getElementById('loginError').textContent='Nomor WA atau Password salah!';
});

// ===== Render Products =====
async function renderProducts(){
const preview=document.getElementById('previewProducts');
const userP=document.getElementById('userProducts');
preview.innerHTML=''; userP.innerHTML='';
const productsSnap = await db.collection('products').orderBy('timestamp','desc').get();
productsSnap.forEach(doc=>{
const p = doc.data();
const div=document.createElement('div'); div.className='product';
div.innerHTML=`<img src="${p.image}" width="180"><h4>${p.name}</h4><p>Rp ${p.price}</p><span>${p.username}</span>
<br><button onclick="window.open('https://wa.me/62${p.wa}','_blank')">Hubungi Penjual</button>`;
if(currentUser && p.username===currentUser.username) div.innerHTML+=`<br><button onclick="deleteProduct('${doc.id}')">Hapus</button>`;
preview.appendChild(div);
if(currentUser && p.username===currentUser.username) userP.appendChild(div.cloneNode(true));
});
}

// ===== Modal Product =====
const modal=document.getElementById('productModal');
document.getElementById('addProductBtn').addEventListener('click',()=>{modal.style.display='block';});
function closeModal(){modal.style.display='none';}

// ===== Save Product =====
document.getElementById('saveProductBtn').addEventListener('click', async ()=>{
const name=document.getElementById('prodName').value.trim();
const price=document.getElementById('prodPrice').value.trim();
const imageFile=document.getElementById('prodImage').files[0];
if(!name||!price||!imageFile){ return alert('Isi semua data!'); }
const storageRef = storage.ref().child('products/'+Date.now()+'_'+imageFile.name);
await storageRef.put(imageFile);
const imageURL = await storageRef.getDownloadURL();
await db.collection('products').add({
name, price, image:imageURL,
username: currentUser.username, wa: currentUser.wa,
timestamp: firebase.firestore.FieldValue.serverTimestamp()
});
renderProducts(); closeModal();
document.getElementById('prodName').value=''; document.getElementById('prodPrice').value=''; document.getElementById('prodImage').value='';
});

// ===== Delete Product =====
async function deleteProduct(id){ if(confirm('Yakin hapus produk ini?')){ await db.collection('products').doc(id).delete(); renderProducts(); } }

showSection('home');
</script>
</body>
</html>
