<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M.AShop Pro HP-Ready</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<style>
body{font-family:'Poppins',sans-serif;margin:0;padding:0;background:linear-gradient(135deg,#f9a825,#0d47a1);color:#333;}
header{position:sticky;top:0;display:flex;justify-content:space-between;align-items:center;padding:1rem;background:rgba(0,0,0,0.25);backdrop-filter:blur(8px);z-index:10;}
header h1{color:white;font-size:1.5rem;}
nav{display:flex;gap:0.5rem;}
nav button, #logoutBtn{background:linear-gradient(90deg,#ff9800,#ffc107,#ff9800);background-size:200% 200%;animation:btnGradient 3s ease infinite;color:white;padding:0.5rem 1rem;border:none;border-radius:8px;cursor:pointer;font-weight:600;z-index:10;}
nav button:hover, #logoutBtn:hover{transform:scale(1.05);}
#logoutBtn{display:none;background:#e53935;}
.hero{padding:1rem;text-align:center;min-height:35vh;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;position:relative;}
.hero h2{color:white;font-size:2rem;margin:0.5rem 0;}
.hero p{color:white;font-size:1rem;margin:0.3rem 0;}
.hero button{margin-top:0.5rem;}
.container{max-width:360px;margin:1.5rem auto;background:white;padding:1.5rem;border-radius:15px;box-shadow:0 6px 25px rgba(0,0,0,0.3);}
input,button{width:100%;padding:0.6rem;margin:0.4rem 0;border-radius:8px;border:1px solid #ccc;}
button{cursor:pointer;}
.products{display:flex;flex-wrap:wrap;gap:0.7rem;justify-content:center;margin-top:1rem;}
.product{background:white;padding:0.8rem;border-radius:12px;box-shadow:0 6px 20px rgba(0,0,0,0.3);width:160px;text-align:center;position:relative;transition:0.3s;}
.product img{width:100%;border-radius:10px;}
.product h4{margin:0.4rem 0;color:#0d47a1;font-size:0.9rem;}
.product p{margin:0.2rem 0;font-weight:600;color:#ff5722;font-size:0.85rem;}
.product span{font-size:0.75rem;color:#555;}
.product button{margin-top:0.3rem;font-size:0.75rem;padding:0.3rem;}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);justify-content:center;align-items:center;z-index:100;}
.modal-content{background:white;padding:1.5rem;border-radius:12px;width:90%;max-width:350px;position:relative;}
.closeBtn{position:absolute;top:8px;right:8px;background:#e53935;color:white;border:none;border-radius:50%;width:28px;height:28px;font-weight:bold;cursor:pointer;}
.closeBtn:hover{background:#d32f2f;}
@keyframes btnGradient{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
section{position:relative;}
.active{display:block;}
section:not(.active){display:none;}
</style>
</head>
<body>

<header>
<h1>M.AShop Pro</h1>
<nav>
<button onclick="showSection('home')">Home</button>
<button onclick="showSection('login')">Login</button>
<button onclick="showSection('register')">Register</button>
</nav>
<button id="logoutBtn" onclick="logout()">Logout</button>
</header>

<section id="home" class="active">
<div class="hero">
<h2>Selamat Datang di M.AShop!</h2>
<p>Belanja cepat. Daftar sebagai penjual untuk mulai menjual produkmu.</p>
<button onclick="showSection('register')">Daftar Sekarang</button>
</div>
<div class="products" id="previewProducts"></div>
</section>

<section id="register">
<div class="container">
<h2>Register Penjual</h2>
<input type="text" id="regUsername" placeholder="Username">
<input type="text" id="regWA" placeholder="Nomor WA (contoh 81234567890)">
<input type="password" id="regPassword" placeholder="Password">
<button id="registerBtn">Daftar</button>
<p id="regError" style="color:red;font-size:0.8rem;"></p>
</div>
</section>

<section id="login">
<div class="container">
<h2>Login</h2>
<input type="text" id="loginWA" placeholder="Nomor WA">
<input type="password" id="loginPassword" placeholder="Password">
<button id="loginBtn">Login</button>
<p id="loginError" style="color:red;font-size:0.8rem;"></p>
</div>
</section>

<section id="dashboard">
<h2>Halo, <span id="userRole"></span></h2>
<button id="addProductBtn">Tambah Produk</button>
<div class="products" id="userProducts"></div>
</section>

<div class="modal" id="productModal">
<div class="modal-content">
<button class="closeBtn" onclick="closeModal()">×</button>
<h3>Tambah Produk</h3>
<input type="text" id="prodName" placeholder="Nama Produk">
<input type="number" id="prodPrice" placeholder="Harga Produk">
<input type="file" id="prodImage" accept="image/*">
<button id="saveProductBtn">Simpan Produk</button>
</div>
</div>

<script>
// ===== Firebase Config =====
const firebaseConfig = {
  apiKey: "AIzaSyDYKENnqeW9vv9SK1-YHjs2IlWn5EkHYuc",
  authDomain: "ma17pro.firebaseapp.com",
  projectId: "ma17pro",
  storageBucket: "ma17pro.firebasestorage.app",
  messagingSenderId: "670069420924",
  appId: "1:670069420924:web:9262b2f95ae3a671c7eaf9",
  measurementId: "G-T1RSBX98VC"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const storage = firebase.storage();

let currentUser = null;

// ===== Functions =====
const sections = document.querySelectorAll('section');
const logoutBtn = document.getElementById('logoutBtn');
function showSection(id){
sections.forEach(sec=>sec.classList.remove('active'));
document.getElementById(id).classList.add('active');
logoutBtn.style.display=currentUser?'inline-block':'none';
if(currentUser) document.getElementById('userRole').textContent=currentUser.username;
renderProducts();
}
function closeModal(){document.getElementById('productModal').style.display='none';}
function logout(){currentUser=null; showSection('home');}

// ===== Register =====
document.getElementById('registerBtn').addEventListener('click',()=>{
const username=document.getElementById('regUsername').value.trim();
const wa=document.getElementById('regWA').value.trim();
const password=document.getElementById('regPassword').value.trim();
if(!username||!wa||!password){document.getElementById('regError').textContent='Isi semua data!'; return;}
db.ref('users').orderByChild('wa').equalTo(wa).once('value',snap=>{
if(snap.exists()){document.getElementById('regError').textContent='Nomor WA sudah terdaftar!'; return;}
db.ref('users').push({username,wa,password,role:'Penjual'});
alert('Akun berhasil dibuat! Silahkan login.'); showSection('login');
});
});

// ===== Login =====
document.getElementById('loginBtn').addEventListener('click',()=>{
const wa=document.getElementById('loginWA').value.trim();
const password=document.getElementById('loginPassword').value.trim();
db.ref('users').orderByChild('wa').equalTo(wa).once('value',snap=>{
if(!snap.exists()){alert('WA tidak ditemukan!'); return;}
let user = Object.values(snap.val())[0];
if(user.password!==password){alert('Password salah!'); return;}
currentUser = user;
showSection('dashboard');
});

// ===== Add Product =====
document.getElementById('addProductBtn').addEventListener('click',()=>{document.getElementById('productModal').style.display='flex';});

document.getElementById('saveProductBtn').addEventListener('click',()=>{
const name=document.getElementById('prodName').value.trim();
const price=document.getElementById('prodPrice').value.trim();
const file=document.getElementById('prodImage').files[0];
if(!name||!price||!file){alert('Isi semua data!'); return;}
if(file.size>100*1024*1024){alert('Max 100MB!'); return;}
const storageRef = storage.ref('products/'+Date.now()+'_'+file.name);
const uploadTask = storageRef.put(file);
uploadTask.on('state_changed', null, err=>alert(err), ()=>{
uploadTask.snapshot.ref.getDownloadURL().then(url=>{
db.ref('products').push({name,price,image:url,username:currentUser.username,wa:currentUser.wa});
renderProducts(); closeModal();
document.getElementById('prodName').value='';
document.getElementById('prodPrice').value='';
document.getElementById('prodImage').value='';
});
});
});

// ===== Render Products =====
function renderProducts(){
const preview=document.getElementById('previewProducts');
const userP=document.getElementById('userProducts');
preview.innerHTML=''; userP.innerHTML='';
db.ref('products').once('value',snap=>{
if(!snap.exists()) return;
Object.keys(snap.val()).forEach(key=>{
const p = snap.val()[key];
const div = document.createElement('div'); div.className='product';
div.innerHTML = `<img src="${p.image}"><h4>${p.name}</h4><p>Rp ${Number(p.price).toLocaleString()}</p><span>${p.username}</span><br>
<button onclick="window.open('https://wa.me/62${p.wa}','_blank')">Hubungi Penjual</button>`;
if(currentUser && p.username===currentUser.username){div.innerHTML+=`<br><button onclick="deleteProduct('${key}')">Hapus</button>`;}
preview.appendChild(div);
if(currentUser && p.username===currentUser.username) userP.appendChild(div.cloneNode(true));
});
});
}

// ===== Delete Product =====
function deleteProduct(key){if(confirm('Yakin hapus produk ini?')){db.ref('products/'+key).remove(); renderProducts();}}

showSection('home');
</script>

</body>
</html>
