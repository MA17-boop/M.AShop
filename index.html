<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toko M.A17 Marketplace</title>

<style>
body {margin:0;font-family:Arial;background:#f5f5f5;}
#landing {
  height:100vh;
  background:linear-gradient(135deg,#ff5722,#ff9800);
  color:white;display:flex;flex-direction:column;
  justify-content:center;align-items:center;text-align:center;
}
button {cursor:pointer}

/* NAV */
.navbar {background:#ff5722;color:white;padding:15px;display:flex;justify-content:space-between;}
.menu {display:flex;justify-content:space-around;background:white;padding:10px;}
.menu button {border:none;background:none;font-weight:bold}

/* GRID */
.grid {display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px;}
.card {background:white;border-radius:15px;overflow:hidden;box-shadow:0 4px 10px rgba(0,0,0,0.1);}
.card img {width:100%}
.info {padding:10px}
.harga {color:#ff5722;font-weight:bold}
.buy {background:#ff5722;color:white;border:none;width:100%;padding:10px}

input,textarea {width:100%;padding:10px;margin:5px 0;border-radius:10px;border:none}
</style>
</head>

<body>

<!-- LANDING -->
<div id="landing">
  <h1>🛒 Toko M.A17 Marketplace</h1>
  <p>Platform jualan & dropship modern 🔥</p>
  <button onclick="masuk()">Masuk 🚀</button>
</div>

<div id="main" style="display:none;">

<div class="navbar">
  <b>M.A17</b>
  <input type="text" placeholder="Cari..." oninput="cari(this.value)">
</div>

<div class="menu">
  <button onclick="show('home')">Home</button>
  <button onclick="show('produk')">Produk</button>
  <button onclick="show('cart')">Keranjang</button>
  <button onclick="show('admin')">Admin</button>
  <button onclick="show('sellerLogin')">Penjual</button>
</div>

<!-- HOME -->
<div id="home"><div class="grid" id="homeList"></div></div>

<!-- PRODUK -->
<div id="produk" style="display:none;"><div class="grid" id="produkList"></div></div>

<!-- CART -->
<div id="cart" style="display:none;padding:10px;">
  <h2>Keranjang</h2>
  <div id="cartList"></div>
  <h3 id="total"></h3>
  <h4 id="profit"></h4>

  <input id="namaPembeli" placeholder="Nama">
  <textarea id="alamat" placeholder="Alamat"></textarea>

  <button onclick="checkout()" class="buy">Checkout</button>
</div>

<!-- ADMIN -->
<div id="admin" style="display:none;padding:10px;">
  <h2>Admin Login</h2>
  <input id="adminPass" type="password">
  <button onclick="loginAdmin()">Login</button>

  <div id="adminPanel" style="display:none;">
    <h3>Total Keuntungan</h3>
    <h2 id="totalProfit">Rp 0</h2>
  </div>
</div>

<!-- SELLER LOGIN -->
<div id="sellerLogin" style="display:none;padding:10px;">
  <h2>Login Penjual</h2>
  <input id="sellerWA" placeholder="Nomor WA">
  <button onclick="loginSeller()">Masuk</button>
</div>

<!-- SELLER PANEL -->
<div id="sellerPanel" style="display:none;padding:10px;">
  <h2>Panel Penjual</h2>

  <input id="nama" placeholder="Nama Produk">
  <input id="harga" type="number" placeholder="Harga Asli">
  <input id="komisi" type="number" placeholder="Komisi Admin">
  <textarea id="deskripsi" placeholder="Deskripsi"></textarea>
  <input type="file" id="gambar">

  <button onclick="tambahProduk()">Upload Produk</button>
</div>

</div>

<script>
let data = JSON.parse(localStorage.getItem("produk")) || [];
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let totalProfit = parseInt(localStorage.getItem("profit")) || 0;
let currentSeller = "";

/* MASUK */
function masuk(){landing.style.display="none";main.style.display="block";}

/* NAV */
function show(p){
  ["home","produk","cart","admin","sellerLogin","sellerPanel"].forEach(id=>{
    document.getElementById(id).style.display="none";
  });
  document.getElementById(p).style.display="block";
  tampil(); tampilCart();
}

/* LOGIN ADMIN */
function loginAdmin(){
  if(adminPass.value==="admin123"){
    adminPanel.style.display="block";
    document.getElementById("totalProfit").innerText="Rp "+totalProfit;
  }
}

/* LOGIN SELLER */
function loginSeller(){
  currentSeller = sellerWA.value;
  sellerPanel.style.display="block";
}

/* TAMBAH PRODUK */
function tambahProduk(){
  let file = gambar.files[0];
  let reader = new FileReader();

  reader.onload = function(){
    data.push({
      nama:nama.value,
      harga:harga.value,
      komisi:komisi.value,
      deskripsi:deskripsi.value,
      wa:currentSeller,
      gambar:reader.result
    });
    localStorage.setItem("produk", JSON.stringify(data));
    alert("Produk ditambahkan");
    tampil();
  }
  if(file) reader.readAsDataURL(file);
}

/* TAMPIL */
function tampil(){
  let home=document.getElementById("homeList");
  let produk=document.getElementById("produkList");
  home.innerHTML=""; produk.innerHTML="";

  data.forEach((p,i)=>{
    let hargaJual = parseInt(p.harga)+parseInt(p.komisi||0);

    let html=`
    <div class="card">
      <img src="${p.gambar}">
      <div class="info">
        <b>${p.nama}</b>
        <div class="harga">Rp ${hargaJual}</div>
        <small>Asli: Rp ${p.harga}</small><br>
        <small>${p.deskripsi}</small>
      </div>
      <button class="buy" onclick="addCart(${i})">Beli</button>
      <button class="buy" onclick="chat('${p.wa}','${p.nama}')">Chat</button>
    </div>`;
    home.innerHTML+=html;
    produk.innerHTML+=html;
  });
}

/* CHAT */
function chat(wa,nama){
  window.open("https://wa.me/"62"?text=Halo saya tertarik dengan "+nama);
}

/* CART */
function addCart(i){
  cart.push(data[i]);
  localStorage.setItem("cart", JSON.stringify(cart));
  alert("Masuk keranjang");
}

function tampilCart(){
  let total=0, profit=0;
  let list="";
  cart.forEach(p=>{
    let hargaJual = parseInt(p.harga)+parseInt(p.komisi||0);
    total+=hargaJual;
    profit+=parseInt(p.komisi||0);
    list+=p.nama+" - Rp "+hargaJual+"<br>";
  });
  cartList.innerHTML=list;
  total.innerText="Total: Rp "+total;
  profit.innerText="Keuntungan kamu: Rp "+profit;
}

/* CHECKOUT */
function checkout(){
  let namaPembeli = document.getElementById("namaPembeli").value;
  let alamat = document.getElementById("alamat").value;

  let group={};

  cart.forEach(p=>{
    if(!group[p.wa]) group[p.wa]=[];
    group[p.wa].push(p);
  });

  for(let wa in group){
    let pesan="Pesanan%0A"+namaPembeli+"%0A"+alamat+"%0A";
    let profit=0;

    group[wa].forEach(p=>{
      let hargaJual=parseInt(p.harga)+parseInt(p.komisi||0);
      pesan+=p.nama+" Rp"+hargaJual+"%0A";
      profit+=parseInt(p.komisi||0);
    });

    totalProfit+=profit;
    window.open("https://wa.me/"+wa+"?text="+pesan);
  }

  localStorage.setItem("profit", totalProfit);
  cart=[];
  localStorage.setItem("cart", JSON.stringify(cart));
  tampilCart();
}

/* SEARCH */
function cari(t){
  let produk=document.getElementById("produkList");
  produk.innerHTML="";
  data.filter(p=>p.nama.toLowerCase().includes(t.toLowerCase()))
  .forEach(p=>{
    produk.innerHTML+=`<div class="card"><img src="${p.gambar}"><div class="info">${p.nama}</div></div>`;
  });
  show('produk');
}

tampil();
</script>

</body>
</html>
