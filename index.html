<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toko M.A17 Marketplace</title>

<style>
body {margin:0;font-family:Arial;background:#f5f5f5;}
#landing {
  height:100vh;
  background:linear-gradient(135deg,#ff5722,#ff9800);
  color:white;display:flex;flex-direction:column;
  justify-content:center;align-items:center;text-align:center;
}
.navbar {background:#ff5722;color:white;padding:15px;display:flex;justify-content:space-between;}
.menu {display:flex;justify-content:space-around;background:white;padding:10px;}
.menu button {border:none;background:none;font-weight:bold;}
.grid {display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px;}
.card {background:white;border-radius:15px;overflow:hidden;box-shadow:0 4px 10px rgba(0,0,0,0.1);}
.card img {width:100%;}
.info {padding:10px;}
.harga {color:#ff5722;font-weight:bold;}
.buy {background:#ff5722;color:white;border:none;width:100%;padding:10px;margin-top:5px;}
input,textarea {width:100%;padding:10px;margin:5px 0;border-radius:10px;border:none;}
#notif {
position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
background:#22c55e;color:white;padding:10px 20px;border-radius:10px;display:none;
}
</style>

<!-- FIREBASE CDN -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

</head>

<body>

<div id="landing">
  <h1>🛒 Toko M.A17 Marketplace</h1>
  <button onclick="masuk()">Masuk 🚀</button>
</div>

<div id="main" style="display:none;">

<div class="navbar">
  <b>M.A17</b>
  <input type="text" placeholder="Cari..." oninput="cari(this.value)">
</div>

<div class="menu">
  <button onclick="show('home')">Home</button>
  <button onclick="show('produk')">Produk</button>
  <button onclick="show('cart')">Keranjang</button>
  <button onclick="show('sellerLogin')">Penjual</button>
</div>

<div id="home"><div class="grid" id="homeList"></div></div>
<div id="produk" style="display:none;"><div class="grid" id="produkList"></div></div>

<div id="cart" style="display:none;padding:10px;">
  <h2>Keranjang</h2>
  <div id="cartList"></div>
  <h3 id="totalText"></h3>

  <input id="namaPembeli" placeholder="Nama">
  <textarea id="alamat" placeholder="Alamat"></textarea>

  <button onclick="checkout()" class="buy">Checkout</button>
</div>

<div id="sellerLogin" style="display:none;padding:10px;">
  <h2>Login Penjual</h2>
  <input id="sellerWA" placeholder="Nomor WA">
  <button onclick="loginSeller()">Masuk</button>
</div>

<div id="sellerPanel" style="display:none;padding:10px;">
  <h2>Panel Penjual</h2>

  <input id="nama" placeholder="Nama Produk">
  <input id="harga" type="number" placeholder="Harga">
  <input id="komisi" type="number" placeholder="Komisi">
  <textarea id="deskripsi" placeholder="Deskripsi"></textarea>
  <input type="file" id="gambar">

  <button onclick="tambahProduk()">Upload</button>
</div>

</div>

<div id="notif"></div>

<script>
/* 🔥 GANTI DENGAN CONFIG FIREBASE KAMU */
const firebaseConfig = {
  apiKey: "AIzaSyBErDo2UA6Ao6LCc_S5pOQmJipvOwpHPEA",
  authDomain: "toko-ma17.firebaseapp.com",
  projectId: "toko-ma17",
  storageBucket: "toko-ma17.firebasestorage.app",
  messagingSenderId: "43901503974",
  appId: "1:43901503974:web:b36486e1aeabd9a24eae27",
  measurementId: "G-WZM7EY10RZ"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let data = [];
let cart = [];
let currentSeller = "";

/* NOTIF */
function notif(text){
  let n=document.getElementById("notif");
  n.innerText=text;
  n.style.display="block";
  setTimeout(()=>n.style.display="none",2000);
}

/* MASUK */
function masuk(){
  landing.style.display="none";
  main.style.display="block";
}

/* NAV */
function show(p){
  ["home","produk","cart","sellerLogin","sellerPanel"].forEach(id=>{
    document.getElementById(id).style.display="none";
  });
  document.getElementById(p).style.display="block";
}

/* LOGIN SELLER */
function loginSeller(){
  currentSeller = sellerWA.value;
  sellerPanel.style.display="block";
  notif("Login berhasil");
}

/* TAMBAH PRODUK */
function tambahProduk(){
  let file = gambar.files[0];
  if(!file){notif("Pilih gambar");return;}

  let reader = new FileReader();
  reader.onload = function(){
    let produk = {
      nama:nama.value,
      harga:harga.value,
      komisi:komisi.value,
      deskripsi:deskripsi.value,
      wa:currentSeller,
      gambar:reader.result
    };

    db.ref("produk").push(produk);
    notif("Produk diupload!");
  }
  reader.readAsDataURL(file);
}

/* AMBIL DATA */
db.ref("produk").on("value", snap=>{
  data=[];
  snap.forEach(d=>data.push(d.val()));
  tampil();
});

/* TAMPIL */
function tampil(){
  let home=document.getElementById("homeList");
  let produk=document.getElementById("produkList");
  home.innerHTML=""; produk.innerHTML="";

  data.forEach((p,i)=>{
    let harga = parseInt(p.harga)+parseInt(p.komisi||0);

    let html=`
    <div class="card">
      <img src="${p.gambar}">
      <div class="info">
        <b>${p.nama}</b>
        <div class="harga">Rp ${harga}</div>
        <small>${p.deskripsi}</small>
      </div>
      <button class="buy" onclick="addCart(${i})">Beli</button>
      <button class="buy" onclick="chat('${p.wa}','${p.nama}')">Chat</button>
    </div>`;
    home.innerHTML+=html;
    produk.innerHTML+=html;
  });
}

/* CART */
function addCart(i){
  cart.push(data[i]);
  notif("Masuk keranjang");
}

function tampilCart(){
  let total=0;
  let list="";
  cart.forEach(p=>{
    let harga = parseInt(p.harga)+parseInt(p.komisi||0);
    total+=harga;
    list+=p.nama+" - Rp "+harga+"<br>";
  });
  cartList.innerHTML=list;
  totalText.innerText="Total: Rp "+total;
}

/* CHECKOUT */
function checkout(){
  let nama=document.getElementById("namaPembeli").value;
  let alamat=document.getElementById("alamat").value;

  if(!nama || !alamat){notif("Isi data!");return;}

  cart.forEach(p=>{
    let harga=parseInt(p.harga)+parseInt(p.komisi||0);

    let pesan = "Pesanan%0A"+nama+"%0A"+alamat+"%0A"+p.nama+" Rp"+harga;

    window.open("https://wa.me/"+p.wa+"?text="+pesan);
  });

  cart=[];
  tampilCart();
  notif("Pesanan dikirim!");
}

/* CHAT */
function chat(wa,nama){
  window.open("https://wa.me/"+wa+"?text=Halo saya tertarik "+nama);
}

/* SEARCH */
function cari(t){
  let produk=document.getElementById("produkList");
  produk.innerHTML="";
  data.filter(p=>p.nama.toLowerCase().includes(t.toLowerCase()))
  .forEach(p=>{
    produk.innerHTML+=`<div class="card"><img src="${p.gambar}"><div class="info">${p.nama}</div></div>`;
  });
  show('produk');
}
</script>

</body>
</html>
