<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M.AShop Firebase WA Login</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body{font-family:'Poppins',sans-serif;margin:0;padding:0;background:linear-gradient(135deg,#f9a825,#0d47a1);color:#333;}
header{display:flex;justify-content:space-between;align-items:center;padding:1rem 2rem;background:rgba(0,0,0,0.2);position:sticky;top:0;z-index:100;backdrop-filter:blur(8px);}
header h1{color:white;}
nav button, #logoutBtn{padding:0.5rem 1rem;border:none;border-radius:8px;cursor:pointer;font-weight:600;}
#logoutBtn{display:none;background:#e53935;color:white;}
section{display:none;padding:2rem;}
section.active{display:block;}
.container{max-width:400px;margin:2rem auto;background:white;padding:2rem;border-radius:15px;box-shadow:0 8px 30px rgba(0,0,0,0.2);}
input,button{width:100%;padding:0.7rem;margin:0.5rem 0;border-radius:8px;border:1px solid #ccc;}
button{background:linear-gradient(90deg,#ff9800,#ffc107,#ff9800);background-size:200% 200%;color:white;}
.products{display:flex;flex-wrap:wrap;gap:1rem;justify-content:center;margin-top:2rem;}
.product{background:white;padding:1rem;border-radius:15px;box-shadow:0 8px 25px rgba(0,0,0,0.3);width:220px;text-align:center;position:relative;}
.product img{width:100%;border-radius:12px;}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);justify-content:center;align-items:center;}
.modal-content{background:white;padding:2rem;border-radius:15px;width:90%;max-width:400px;position:relative;}
.closeBtn{position:absolute;top:10px;right:10px;background:#e53935;color:white;border:none;border-radius:50%;width:30px;height:30px;font-weight:bold;cursor:pointer;}
</style>
</head>
<body>

<header>
<h1>M.AShop</h1>
<nav>
<button onclick="showSection('home')">Home</button>
<button onclick="showSection('login')">Login</button>
<button onclick="showSection('register')">Register</button>
</nav>
<button id="logoutBtn" onclick="logout()">Logout</button>
</header>

<section id="home" class="active">
<h2>Selamat Datang di M.AShop!</h2>
<p>Belanja mudah & cepat. Daftar sebagai penjual untuk mulai menjual produkmu.</p>
<button onclick="showSection('register')">Daftar Sekarang</button>
<div class="products" id="previewProducts"></div>
</section>

<section id="register">
<div class="container">
<h2>Register Penjual Baru</h2>
<input type="text" id="regUsername" placeholder="Username">
<input type="text" id="regWA" placeholder="Nomor WA (misal 81234567890)">
<input type="password" id="regPassword" placeholder="Password">
<button id="registerBtn">Register</button>
<p id="regError" style="color:red;"></p>
</div>
</section>

<section id="login">
<div class="container">
<h2>Login</h2>
<input type="text" id="loginWA" placeholder="Nomor WA">
<input type="password" id="loginPassword" placeholder="Password">
<button id="loginBtn">Login</button>
<p id="loginError" style="color:red;"></p>
</div>
</section>

<section id="dashboard">
<h2>Halo, <span id="userRole"></span></h2>
<h3>Produk Anda</h3>
<div class="products" id="userProducts"></div>
<button id="addProductBtn">Tambah Produk</button>
</section>

<div class="modal" id="productModal">
<div class="modal-content">
<button class="closeBtn" onclick="closeModal()">×</button>
<h3>Tambah Produk</h3>
<input type="text" id="prodName" placeholder="Nama Produk">
<input type="number" id="prodPrice" placeholder="Harga Produk">
<input type="file" id="prodImage" accept="image/*">
<button id="saveProductBtn">Simpan Produk</button>
</div>
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<script>
// ===== Firebase Config =====
const firebaseConfig = {
  apiKey: "AIzaSyAqPWxMcBFj6-t_fUJx0AmJFryvrozLHNo",
  authDomain: "ma17shop.firebaseapp.com",
  projectId: "ma17shop",
  storageBucket: "ma17shop.appspot.com",
  messagingSenderId: "473838132234",
  appId: "1:473838132234:web:4b336fc4f16e586dc4d3f3"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const storage = firebase.storage();

// ===== Navigation =====
const sections = document.querySelectorAll('section');
const logoutBtn = document.getElementById('logoutBtn');
let currentUser = null;
function showSection(id){
sections.forEach(sec=>sec.classList.remove('active'));
document.getElementById(id).classList.add('active');
logoutBtn.style.display=currentUser?'inline-block':'none';
if(currentUser) document.getElementById('userRole').textContent=currentUser.username;
renderProducts();
}
function logout(){ currentUser=null; showSection('home');}

// ===== Register =====
document.getElementById('registerBtn').addEventListener('click', async ()=>{
const username=document.getElementById('regUsername').value.trim();
const wa=document.getElementById('regWA').value.trim();
const password=document.getElementById('regPassword').value.trim();
const regError=document.getElementById('regError');
if(!username||!wa||!password){ regError.textContent='Isi semua data!'; return;}
const snapshot = await db.collection('users').where('wa','==',wa).get();
if(!snapshot.empty){ regError.textContent='Nomor WA sudah dipakai!'; return;}
await db.collection('users').add({username,wa,password});
alert('Akun berhasil dibuat! Silahkan login.'); showSection('login');
});

// ===== Login =====
document.getElementById('loginBtn').addEventListener('click', async ()=>{
const wa=document.getElementById('loginWA').value.trim();
const password=document.getElementById('loginPassword').value.trim();
const snapshot = await db.collection('users').where('wa','==',wa).where('password','==',password).get();
if(!snapshot.empty){
currentUser = snapshot.docs[0].data(); currentUser.id = snapshot.docs[0].id;
showSection('dashboard');
}else document.getElementById('loginError').textContent='Nomor WA atau Password salah!';
});

// ===== Render Products =====
async function renderProducts(){
const preview=document.getElementById('previewProducts');
const userP=document.getElementById('userProducts');
preview.innerHTML=''; userP.innerHTML='';
const productsSnap = await db.collection('products').orderBy('timestamp','desc').get();
productsSnap.forEach(doc=>{
const p = doc.data();
const div=document.createElement('div'); div.className='product';
div.innerHTML=`<img src="${p.image}"><h4>${p.name}</h4><p>Rp ${Number(p.price).toLocaleString()}</p><span>${p.username}</span>
<button onclick="window.open('https://wa.me/62${p.wa}','_blank')">Hubungi Penjual</button>`;
if(currentUser && p.username===currentUser.username) div.innerHTML+=`<button onclick="deleteProduct('${doc.id}')">Hapus</button>`;
preview.appendChild(div);
if(currentUser && p.username===currentUser.username) userP.appendChild(div.cloneNode(true));
});
}

// ===== Modal Product =====
const modal=document.getElementById('productModal');
document.getElementById('addProductBtn').addEventListener('click',()=>{modal.style.display='flex';});
function closeModal(){modal.style.display='none';}

// ===== Save Product =====
document.getElementById('saveProductBtn').addEventListener('click', async ()=>{
const name=document.getElementById('prodName').value.trim();
const price=document.getElementById('prodPrice').value.trim();
const imageFile=document.getElementById('prodImage').files[0];
if(!name||!price||!imageFile){ return alert('Isi semua data!'); }
const storageRef = storage.ref().child('products/'+Date.now()+'_'+imageFile.name);
await storageRef.put(imageFile);
const imageURL = await storageRef.getDownloadURL();
await db.collection('products').add({
name, price, image:imageURL,
username: currentUser.username, wa: currentUser.wa,
timestamp: firebase.firestore.FieldValue.serverTimestamp()
});
renderProducts(); closeModal();
document.getElementById('prodName').value=''; document.getElementById('prodPrice').value=''; document.getElementById('prodImage').value='';
});

// ===== Delete Product =====
async function deleteProduct(id){ if(confirm('Yakin hapus produk ini?')){ await db.collection('products').doc(id).delete(); renderProducts(); } }

showSection('home');
</script>

</body>
</html>
