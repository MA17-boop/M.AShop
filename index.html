<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M.AShop Final</title>
<style>
/* ===== Umum ===== */
body{font-family:Arial,sans-serif;margin:0;padding:0;background:#f0f0f0;}
header{background:#0077ff;color:white;padding:1rem;display:flex;justify-content:space-between;align-items:center;}
header button{background:white;color:#0077ff;padding:0.5rem 1rem;border:none;border-radius:5px;cursor:pointer;transition: transform 0.3s;}
header button:hover{transform:scale(1.1);}
section{display:none;padding:2rem;}
section.active{display:block;animation:fadeIn 1s ease;}
h2,h3{margin-top:0;}

/* ===== Hero ===== */
.hero{text-align:center;padding:3rem 1rem;}
.hero img{width:150px;animation:bounce 2s infinite;}

/* ===== Products ===== */
.products{display:flex;justify-content:center;gap:1rem;padding:2rem;flex-wrap:wrap;}
.product{background:white;padding:1rem;border-radius:10px;transition:transform 0.3s,box-shadow 0.3s;cursor:pointer;width:120px;text-align:center;position:relative;}
.product:hover{transform:translateY(-10px);box-shadow:0 10px 20px rgba(0,0,0,0.2);}
.product button{display:none;position:absolute;top:5px;right:5px;background:red;color:white;border:none;padding:2px 5px;border-radius:3px;cursor:pointer;}
.product:hover button{display:block;}

/* ===== Login ===== */
.login-container{max-width:300px;margin:50px auto;background:white;padding:2rem;border-radius:10px;box-shadow:0 5px 20px rgba(0,0,0,0.2);}
.login-container input,.login-container button{width:100%;padding:0.5rem;margin:0.5rem 0;}
.error{color:red;font-size:0.9rem;}

/* ===== Dashboard ===== */
#dashboard .product-table{margin-top:1rem;}
#addProduct{margin-top:1rem;padding:0.5rem 1rem;background:#0077ff;color:white;border:none;border-radius:5px;cursor:pointer;}
#addProduct:hover{background:#005bb5;}
table{width:100%;border-collapse:collapse;margin-top:1rem;}
th,td{border:1px solid #ddd;padding:0.5rem;text-align:center;}
th{background:#0077ff;color:white;}

/* ===== Animasi ===== */
@keyframes bounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-20px);}}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

/* ===== Responsif ===== */
@media(max-width:600px){.products{flex-direction:column;align-items:center;}}
</style>
</head>
<body>

<header>
<h1>M.AShop</h1>
<div id="navBtns">
<button onclick="showSection('home')">Home</button>
<button onclick="showSection('login')">Login</button>
<button onclick="showSection('products')">Produk</button>
</div>
<button id="logoutBtn" onclick="logout()" style="display:none;">Logout</button>
</header>

<!-- ===== Home ===== -->
<section id="home" class="active">
<div class="hero">
<h2>Selamat Datang di M.AShop!</h2>
<p>Belanja mudah & cepat, semua ada di sini.</p>
<img src="https://cdn-icons-png.flaticon.com/512/263/263142.png" alt="Keranjang">
</div>
<div class="products-preview">
<h3>Produk Terbaru</h3>
<div class="products" id="previewProducts"></div>
</div>
</section>

<!-- ===== Login ===== -->
<section id="login">
<div class="login-container">
<h2>Login</h2>
<form id="loginForm">
<input type="text" id="username" placeholder="Username" required>
<input type="password" id="password" placeholder="Password" required>
<button type="submit">Login</button>
<p id="error" class="error"></p>
</form>
</div>
</section>

<!-- ===== Products ===== -->
<section id="products">
<h2>Daftar Produk</h2>
<div class="products" id="allProducts"></div>
</section>

<!-- ===== Dashboard ===== -->
<section id="dashboard">
<h2>Selamat Datang, <span id="userRole"></span></h2>
<h3>Produk Anda</h3>
<div class="products" id="userProducts"></div>
<button id="addProduct">Tambah Produk</button>
</section>

<script>
// ===== Dummy Users =====
const users = [
{username:'admin',password:'Alfian17',role:'Admin'},
{username:'seller',password:'seller123',role:'Penjual'}
];

// ===== Dummy Produk =====
let products = [
{name:'Produk 1',price:'Rp50.000',owner:'seller'},
{name:'Produk 2',price:'Rp75.000',owner:'seller'},
{name:'Produk A',price:'Rp60.000',owner:'admin'},
{name:'Produk B',price:'Rp80.000',owner:'admin'}
];

// ===== Navigasi =====
const sections = document.querySelectorAll('section');
const logoutBtn = document.getElementById('logoutBtn');
function showSection(id){
sections.forEach(sec=>sec.classList.remove('active'));
document.getElementById(id).classList.add('active');
const loggedUser = JSON.parse(localStorage.getItem('loggedInUser'));
if(loggedUser){ logoutBtn.style.display='inline-block'; if(id==='login') showSection('dashboard'); }
else logoutBtn.style.display='none';
renderProducts();
}

// ===== Render Produk =====
function renderProducts(){
const preview = document.getElementById('previewProducts');
const allP = document.getElementById('allProducts');
const userP = document.getElementById('userProducts');
preview.innerHTML=''; allP.innerHTML=''; userP.innerHTML='';
products.forEach((p,i)=>{
// Preview
const div1=document.createElement('div'); div1.className='product'; div1.textContent=p.name; preview.appendChild(div1);
// All Products
const div2=document.createElement('div'); div2.className='product'; div2.textContent=p.name+' | '+p.price; allP.appendChild(div2);
// User Products
const loggedUser = JSON.parse(localStorage.getItem('loggedInUser'));
if(loggedUser && (loggedUser.role==='Admin' || p.owner===loggedUser.username)){
const div3=document.createElement('div'); div3.className='product'; div3.textContent=p.name+' | '+p.price;
const btn = document.createElement('button'); btn.textContent='Hapus'; btn.onclick=()=>{products.splice(i,1); renderProducts();}
div3.appendChild(btn);
userP.appendChild(div3);
}
});
}

// ===== Login =====
const loginForm=document.getElementById('loginForm');
if(loginForm){
loginForm.addEventListener('submit',function(e){
e.preventDefault();
const username=document.getElementById('username').value;
const password=document.getElementById('password').value;
const errorEl=document.getElementById('error');
const user=users.find(u=>u.username===username && u.password===password);
if(user){
localStorage.setItem('loggedInUser',JSON.stringify(user));
document.getElementById('userRole').textContent=user.role;
showSection('dashboard');
} else { errorEl.textContent='Username atau Password salah!'; }
});
}

// ===== Logout =====
function logout(){ localStorage.removeItem('loggedInUser'); showSection('home'); }

// ===== Tambah Produk =====
document.getElementById('addProduct').addEventListener('click',function(){
const loggedUser = JSON.parse(localStorage.getItem('loggedInUser'));
if(!loggedUser) return alert('Login dulu!');
const name = prompt('Nama Produk:'); if(!name) return;
const price = prompt('Harga Produk:'); if(!price) return;
products.push({name,price,owner:loggedUser.username});
renderProducts();
});

// ===== Check Login on Load =====
const loggedUser = JSON.parse(localStorage.getItem('loggedInUser'));
if(loggedUser){ document.getElementById('userRole').textContent = loggedUser.role; logoutBtn.style.display='inline-block'; }

renderProducts();
</script>

</body>
</html>
