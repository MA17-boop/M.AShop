 <!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toko M.A17</title>

<style>
body {margin:0;font-family:Arial;background:#f1f5f9;}
.navbar {background:#22c55e;color:white;padding:15px;display:flex;justify-content:space-between;}
.menu {display:flex;gap:10px;padding:10px;}
.menu button {padding:10px;border:none;border-radius:10px;background:#0f172a;color:white;}
.grid {display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:10px;}
.card {background:white;padding:10px;border-radius:15px;}
.card img {width:100%;border-radius:10px;}
.harga {color:#22c55e;font-weight:bold;}
input,textarea {width:100%;padding:10px;margin:5px 0;}
</style>
</head>

<body>

<div class="navbar">
  <b>Toko M.A17 🛒</b>
  <input type="text" placeholder="Cari..." oninput="cari(this.value)">
</div>

<div class="menu">
  <button onclick="show('home')">Home</button>
  <button onclick="show('produk')">Produk</button>
  <button onclick="show('cart')">Keranjang</button>
  <button onclick="show('admin')">Admin</button>
</div>

<!-- HOME -->
<div id="home">
  <h2 style="padding:10px;">🔥 Produk</h2>
  <div class="grid" id="homeList"></div>
</div>

<!-- PRODUK -->
<div id="produk" style="display:none;">
  <div class="grid" id="produkList"></div>
</div>

<!-- CART -->
<div id="cart" style="display:none;padding:10px;">
  <h2>🛍️ Keranjang</h2>
  <div id="cartList"></div>
  <h3 id="total"></h3>

  <input id="namaPembeli" placeholder="Nama">
  <textarea id="alamat" placeholder="Alamat"></textarea>

  <button onclick="checkout()">Checkout WhatsApp</button>
</div>

<!-- ADMIN -->
<div id="admin" style="display:none;padding:10px;">
  <h2>Login Admin</h2>
  <input type="password" id="pass" placeholder="Password">
  <button onclick="login()">Login</button>

  <div id="panel" style="display:none;">
    <h3>Tambah Produk</h3>
    <input type="text" id="nama" placeholder="Nama Produk">
    <input type="number" id="harga" placeholder="Harga">
    <input type="file" id="gambar">
    <button onclick="tambah()">Tambah</button>
  </div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("produk")) || [];
let cart = JSON.parse(localStorage.getItem("cart")) || [];

function show(p){
  ["home","produk","cart","admin"].forEach(id=>{
    document.getElementById(id).style.display="none";
  });
  document.getElementById(p).style.display="block";
  tampil(); tampilCart();
}

function tambah(){
  let nama=document.getElementById("nama").value;
  let harga=document.getElementById("harga").value;
  let file=document.getElementById("gambar").files[0];

  let reader=new FileReader();
  reader.onload=function(){
    data.push({nama,harga,gambar:reader.result});
    localStorage.setItem("produk", JSON.stringify(data));
    alert("Produk ditambahkan!");
    tampil();
  }
  if(file){reader.readAsDataURL(file);} else alert("Pilih gambar");
}

function tampil(){
  let home=document.getElementById("homeList");
  let produk=document.getElementById("produkList");
  home.innerHTML=""; produk.innerHTML="";

  data.forEach((p,i)=>{
    let html=`
    <div class="card">
      <img src="${p.gambar}">
      <b>${p.nama}</b>
      <div class="harga">Rp ${p.harga}</div>
      <button onclick="addCart(${i})">+ Keranjang</button>
    </div>`;
    home.innerHTML+=html;
    produk.innerHTML+=html;
  });
}

function addCart(i){
  cart.push(data[i]);
  localStorage.setItem("cart", JSON.stringify(cart));
  alert("Masuk keranjang");
}

function tampilCart(){
  let list=document.getElementById("cartList");
  let total=0;
  list.innerHTML="";
  cart.forEach((p,i)=>{
    total+=parseInt(p.harga);
    list.innerHTML+=`
    <div>${p.nama} - Rp ${p.harga}
    <button onclick="hapusCart(${i})">Hapus</button></div>`;
  });
  document.getElementById("total").innerText="Total: Rp "+total;
}

function hapusCart(i){
  cart.splice(i,1);
  localStorage.setItem("cart", JSON.stringify(cart));
  tampilCart();
}

function checkout(){
  let nama=document.getElementById("namaPembeli").value;
  let alamat=document.getElementById("alamat").value;

  if(!nama||!alamat){alert("Isi data dulu!");return;}

  let pesan="🛒 PESANAN%0A";
  pesan+="Nama:"+nama+"%0AAlamat:"+alamat+"%0A";

  let total=0;
  cart.forEach((p,i)=>{
    pesan+=(i+1)+". "+p.nama+" Rp"+p.harga+"%0A";
    total+=parseInt(p.harga);
  });

  pesan+="Total: Rp "+total;

  let nomor="628XXXXXXXXXX"; // GANTI NOMOR KAMU

  window.open("https://wa.me/"+nomor+"?text="+pesan);

  cart=[];
  localStorage.setItem("cart", JSON.stringify(cart));
  tampilCart();
}

function login(){
  if(document.getElementById("pass").value==="admin123"){
    document.getElementById("panel").style.display="block";
  } else alert("Password salah");
}

function cari(t){
  let produk=document.getElementById("produkList");
  produk.innerHTML="";
  data.filter(p=>p.nama.toLowerCase().includes(t.toLowerCase()))
  .forEach((p,i)=>{
    produk.innerHTML+=`
    <div class="card">
      <img src="${p.gambar}">
      <b>${p.nama}</b>
      <div class="harga">Rp ${p.harga}</div>
    </div>`;
  });
  show('produk');
}

tampil();
</script>

</body>
</html>
