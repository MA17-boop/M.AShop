<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Animated Login Form</title>

<!-- Font Awesome untuk icon -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
/* ===== Body & Background ===== */
body {
  margin: 0;
  padding: 0;
  font-family: 'Poppins', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  background: linear-gradient(135deg, #f9a825, #0d47a1);
}

/* ===== Login Box ===== */
.box {
  width: 350px;
  background: white;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  overflow: hidden;
  animation: fadeIn 1s ease forwards;
}

.loginBx {
  padding: 40px 30px;
  display: flex;
  flex-direction: column;
  animation: slideUp 0.8s ease forwards;
}

.loginBx h2 {
  text-align: center;
  margin-bottom: 30px;
  color: #0d47a1;
  font-size: 1.8rem;
  position: relative;
}

.loginBx h2 i.fa-heart {
  color: #ff5252;
  margin-left: 10px;
}

/* ===== Inputs ===== */
.loginBx input[type="text"],
.loginBx input[type="password"] {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
  outline: none;
  transition: 0.3s;
}

.loginBx input[type="text"]:focus,
.loginBx input[type="password"]:focus {
  border-color: #0d47a1;
  box-shadow: 0 0 8px rgba(13,71,161,0.3);
}

/* ===== Submit Button ===== */
.loginBx input[type="submit"] {
  margin-top: 15px;
  background: linear-gradient(90deg,#ff9800,#ffc107,#ff9800);
  background-size: 200% 200%;
  animation: gradientBtn 3s ease infinite;
  border: none;
  padding: 12px;
  border-radius: 8px;
  color: white;
  font-weight: 600;
  cursor: pointer;
  transition: 0.3s;
}

.loginBx input[type="submit"]:hover {
  transform: scale(1.05);
}

/* ===== Links ===== */
.group {
  display: flex;
  justify-content: space-between;
  margin-top: 15px;
}

.group a {
  color: #0d47a1;
  text-decoration: none;
  font-size: 0.85rem;
  transition: 0.3s;
}

.group a:hover {
  color: #ff5252;
  text-decoration: underline;
}

/* ===== Animations ===== */
@keyframes gradientBtn {
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

@keyframes fadeIn {
  0%{opacity:0;}
  100%{opacity:1;}
}

@keyframes slideUp {
  0%{opacity:0; transform: translateY(50px);}
  100%{opacity:1; transform: translateY(0);}
}
</style>
</head>

<body>
<div class="box">
  <div class="loginBx">
    <h2>
      <i class="fa-solid fa-right-to-bracket"></i>
      Login
      <i class="fa-solid fa-heart"></i>
    </h2>

    <input type="text" placeholder="Username">
    <input type="password" placeholder="Password">
    <input type="submit" value="Sign in">

    <div class="group">
      <a href="#">Forgot Password</a>
      <a href="#">Sign up</a>
    </div>
  </div>
</div>
</body>
</html>
